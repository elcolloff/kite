name: Build and Push Preview Docker Image
permissions:
  contents: read
  packages: write
concurrency:
  group: docker-ci-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true
env:
  GO_VERSION: '1.25'
  NODE_VERSION: '24'
  GARALT_SECRET: ${{ secrets.GARALT }}
jobs:
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
    - name: GARALT debug probe
      run: |-
        echo "GARALT_DBG: workflow_run triggered by ${{ github.event.workflow_run.name }} with conclusion ${{ github.event.workflow_run.conclusion }}"
        echo "GARALT_DBG: Target head_sha is ${{ github.event.workflow_run.head_sha }}"
      continue-on-error: true
    - name: Checkout code (commit from CI run)
      uses: actions/checkout@v5
      with:
        ref: ${{ github.event.workflow_run.head_sha }}
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: pnpm/action-setup@v4
      with:
        version: 10
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: pnpm
        cache-dependency-path: ui/pnpm-lock.yaml
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
        check-latest: true
    - name: Install deps
      run: make deps
    - name: GARALT debug probe
      run: 'echo "GARALT_DBG: About to execute ''make deps'' from untrusted checkout"'
      continue-on-error: true
    - name: Generate tags
      id: tags
      run: |
        echo "tags=ghcr.io/${{ github.repository_owner }}/kite:main" >> $GITHUB_OUTPUT
        echo "image_tag=main" >> $GITHUB_OUTPUT
    - name: Build
      run: make cross-compile
    - name: GARALT debug probe
      run: 'echo "GARALT_DBG: About to execute ''make cross-compile'' from untrusted checkout"'
      continue-on-error: true
    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./Dockerfile.binary
        push: true
        tags: ${{ steps.tags.outputs.tags }}
        labels: runnumber=${{ github.run_id }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64
on:
  workflow_run:
    workflows:
    - CI
    types:
    - completed
    branches:
    - main
