name: CI
permissions:
  contents: read
  issues: write
  pull-requests: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  GO_VERSION: '1.25'
  NODE_VERSION: '24'
  GARALT_SECRET: ${{ secrets.GARALT }}
jobs:
  ci:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - name: GARALT debug probe
      run: 'echo "GARALT_DBG: CI workflow triggered by ${{ github.event_name }} from ${{ github.event.pull_request.head.repo.full_name || github.repository }}"'
      continue-on-error: true
    - name: Checkout code
      uses: actions/checkout@v5
    - uses: pnpm/action-setup@v4
      with:
        version: 10
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: pnpm
        cache-dependency-path: ui/pnpm-lock.yaml
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
        check-latest: true
    - name: Install deps
      run: make deps
    - name: Build
      run: make build
on:
  push:
    branches:
    - main
    paths:
    - '**/*.go'
    - '**/*.ts'
    - '**/*.tsx'
    - '**/*.css'
    - go.mod
    - ui/package.json
    - ui/vite.config.ts
    - ui/tsconfig*.json
    - ui/eslint.config.js
    - Dockerfile*
  pull_request:
    branches:
    - main
    paths:
    - '**/*.go'
    - '**/*.ts'
    - '**/*.tsx'
    - '**/*.css'
    - .github/workflows/ci.yml
    - go.mod
    - ui/package.json
    - ui/vite.config.ts
    - ui/tsconfig*.json
    - ui/eslint.config.js
    - Dockerfile*
